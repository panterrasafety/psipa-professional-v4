import React, { useEffect, useState } from 'react';
import './styles/app.css';

export default function App() {
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const onMessage = (event) => {
      if (event?.data?.type === 'PSIPA_READY') setLoaded(true);
    };
    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, []);

  return (
    <main className="app-shell" aria-label="PSIPA Professional application">
      {!loaded && <div className="loading-banner">Loading PSIPA Professional…</div>}
      <iframe
        className="psipa-frame"
        src="/legacy/index.html"
        title="PSIPA Professional complete assessment"
        onLoad={() => setLoaded(true)}
        allow="camera; geolocation; clipboard-read; clipboard-write"
      />
    </main>
  );
}
